  fields:
    node:
      name: Node
      description: "Node name (e.g., pve)"
      required: true
      selector:
        text:
    confirm:
      name: Confirm
      description: "Must be true to execute the reboot."
      required: false
      selector:
        boolean:


wake_node:
  name: "Proxmox: Wake Node"
  description: "Wake a Proxmox node using Wake-on-LAN"
  fields:
    node:
      name: Node
      required: true
      selector:
        text:
    mac:
      name: MAC Address
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text: