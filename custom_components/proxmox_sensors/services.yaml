create_vzdump_backup:
  name: "Proxmox: Start Backup"
  description: "Performs a backup of a VM or CT to the selected storage."
  fields:
    node:
      name: Node
      description: "Node name (e.g., pve)"
      required: true
      selector:
        text:
    storage:
      name: Target Storage
      description: "Storage name (e.g., local, local-lvm, pbs)"
      required: true
      selector:
        text:
    vmid:
      name: VM/CT ID
      description: "Numeric ID of the machine (e.g., 100)"
      required: true
      selector:
        number:
          min: 1
          max: 999999
          mode: box
    mode:
      name: Backup mode
      description: "snapshot, suspend or stop"
      required: false
      default: "snapshot"
      selector:
        select:
          options:
            - label: "Snapshot"
              value: "snapshot"
            - label: "Suspend"
              value: "suspend"
            - label: "Stop"
              value: "stop"
    compress:
      name: Compression
      description: "Compression method"
      required: false
      default: "zstd"
      selector:
        select:
          options:
            - label: "zstd"
              value: "zstd"
            - label: "gzip"
              value: "gzip"
            - label: "lzo"
              value: "lzo"
            - label: "No compression"
              value: "none"


backup_all:
  name: "Proxmox: Massive Backup"
  description: "Performs backup of all VMs and/or CTs on the selected node."
  fields:
    node:
      name: Node
      description: "Node name (e.g., pve)"
      required: true
      selector:
        text:
    storage:
      name: Target Storage
      description: "Storage name (e.g., local, local-lvm, pbs)"
      required: true
      selector:
        text:
    mode:
      name: Backup mode
      description: "snapshot, suspend or stop"
      required: false
      default: "snapshot"
      selector:
        select:
          options:
            - label: "Snapshot"
              value: "snapshot"
            - label: "Suspend"
              value: "suspend"
            - label: "Stop"
              value: "stop"
    compress:
      name: Compression
      description: "Compression method"
      required: false
      default: "zstd"
      selector:
        select:
          options:
            - label: "zstd"
              value: "zstd"
            - label: "gzip"
              value: "gzip"
            - label: "lzo"
              value: "lzo"
            - label: "No compression"
              value: "none"
    max_concurrent:
      name: Maximum concurrent
      description: "Maximum number of simultaneous backups (1 = one by one)"
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box
    delay_between:
      name: Delay between backups
      description: "Seconds to wait between backups (0 = no delay)"
      required: false
      default: 30
      selector:
        number:
          min: 0
          max: 300
          step: 5
          mode: box
    include_vms:
      name: Include VMs
      description: "If enabled, all VMs on the node will be included."
      required: false
      selector:
        boolean:
    include_cts:
      name: Include CTs
      description: "If enabled, all CTs on the node will be included."
      required: false
      selector:
        boolean:


confirm_shutdown_node:
  name: "Proxmox: Shutdown Node"
  description: "Requests confirmation and shuts down the selected node."
  fields:
    node:
      name: Node
      description: "Node name (e.g., pve)"
      required: true
      selector:
        text:
    confirm:
      name: Confirm
      description: "Must be true to execute the shutdown."
      required: false
      selector:
        boolean:


confirm_reboot_node:
  name: "Proxmox: Reboot Node"
  description: "Requests confirmation and reboots the selected node."
  fields:
    node:
      name: Node
      description: "Node name (e.g., pve)"
      required: true
      selector:
        text:
    confirm:
      name: Confirm
      description: "Must be true to execute the reboot."
      required: false
      selector:
        boolean:
