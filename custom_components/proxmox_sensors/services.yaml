create_vzdump_backup:
  name: "Proxmox: Start Backup"
  description: "Performs a backup of selected VMs and/or CTs to the chosen storage."
  fields:
    node:
      name: Node
      description: "Node name (e.g., server)"
      required: true
      selector:
        text:

    storage:
      name: Target Storage
      description: "Storage name (e.g., local, PBS_Local)"
      required: true
      selector:
        text:

    guests:
      name: Guests (VM/CT IDs)
      description: "List of VM/CT numeric IDs (e.g. 100,101 or YAML list)"
      required: true
      selector:
        text:

    mode:
      name: Backup mode
      description: "snapshot, suspend or stop"
      required: false
      default: "snapshot"
      selector:
        select:
          options:
            - label: "Snapshot"
              value: "snapshot"
            - label: "Suspend"
              value: "suspend"
            - label: "Stop"
              value: "stop"

    compress:
      name: Compression
      description: "Compression method"
      required: false
      default: "zstd"
      selector:
        select:
          options:
            - label: "zstd"
              value: "zstd"
            - label: "gzip"
              value: "gzip"
            - label: "lzo"
              value: "lzo"
            - label: "No compression"
              value: "none"

    max_concurrent:
      name: Maximum concurrent
      description: "Maximum number of simultaneous backups (1 = sequential)"
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    delay_between:
      name: Delay between backups
      description: "Seconds to wait between backups"
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 300
          step: 5
          mode: box

backup_all:
  name: "Proxmox: Massive Backup"
  description: "Performs backup of all VMs and/or CTs on the selected node."
  fields:
    node:
      name: Node
      description: "Node name (e.g., pve)"
      required: true
      selector:
        text:
    storage:
      name: Target Storage
      description: "Storage name (e.g., local, local-lvm, pbs)"
      required: true
      selector:
        text:
    mode:
      name: Backup mode
      description: "snapshot, suspend or stop"
      required: false
      default: "snapshot"
      selector:
        select:
          options:
            - label: "Snapshot"
              value: "snapshot"
            - label: "Suspend"
              value: "suspend"
            - label: "Stop"
              value: "stop"
    compress:
      name: Compression
      description: "Compression method"
      required: false
      default: "zstd"
      selector:
        select:
          options:
            - label: "zstd"
              value: "zstd"
            - label: "gzip"
              value: "gzip"
            - label: "lzo"
              value: "lzo"
            - label: "No compression"
              value: "none"
    max_concurrent:
      name: Maximum concurrent
      description: "Maximum number of simultaneous backups (1 = one by one)"
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box
    delay_between:
      name: Delay between backups
      description: "Seconds to wait between backups (0 = no delay)"
      required: false
      default: 30
      selector:
        number:
          min: 0
          max: 300
          step: 5
          mode: box
    include_vms:
      name: Include VMs
      description: "If enabled, all VMs on the node will be included."
      required: false
      selector:
        boolean:
    include_cts:
      name: Include CTs
      description: "If enabled, all CTs on the node will be included."
      required: false
      selector:
        boolean:


confirm_shutdown_node:
