<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo transparente -->
  <rect width="100" height="100" fill="none"/>

  <!-- Hexágono exterior -->
  <polygon
    points="50,6 82,24 82,56 50,74 18,56 18,24"
    fill="none"
    stroke="#212121"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- Núcleo central -->
  <circle cx="50" cy="40" r="8" fill="#212121"/>
  <circle cx="50" cy="40" r="4" fill="#ffffff"/>

  <!-- Nodo superior izquierdo -->
  <circle cx="34" cy="28" r="6" fill="#ff6f00"/>
  <circle cx="34" cy="28" r="3" fill="#ffffff"/>

  <!-- Nodo superior derecho -->
  <circle cx="66" cy="28" r="6" fill="#ff6f00"/>
  <circle cx="66" cy="28" r="3" fill="#ffffff"/>

  <!-- Nodo inferior -->
  <circle cx="50" cy="58" r="6" fill="#ff6f00"/>
  <circle cx="50" cy="58" r="3" fill="#ffffff"/>

  <!-- Conexiones -->
  <line x1="34" y1="28" x2="50" y2="40" stroke="#ff6f00" stroke-width="2" stroke-linecap="round"/>
  <line x1="66" y1="28" x2="50" y2="40" stroke="#ff6f00" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="58" x2="50" y2="40" stroke="#ff6f00" stroke-width="2" stroke-linecap="round"/>
</svg>
